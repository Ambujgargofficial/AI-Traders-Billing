          {isOpen && (
            <Fragment>
              <div className="fixed inset-0 z-40" onClick={() => setIsOpen(false)}></div>
              <div className="absolute z-50 w-full mt-1 bg-white border border-gray-300 rounded-lg shadow-xl top-full left-0 overflow-hidden">
                <input 
                  autoFocus
                  type="text"
                  placeholder="Search..."
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  className="w-full p-3 border-b outline-none text-sm bg-gray-50"
                />
                <ul className="max-h-60 overflow-y-auto">
                  {filteredOptions.map((opt, idx) => (
                    <li 
                      key={idx}
                      onClick={() => {
                        onSelect(opt.value);
                        setIsOpen(false);
                        setSearch('');
                      }}
                      className="p-3 hover:bg-blue-50 cursor-pointer text-sm border-b last:border-0"
                    >
                      {opt.label}
                    </li>
                  ))}
                  {filteredOptions.length === 0 && (
                    <li className="p-3 text-gray-500 text-sm text-center">No results found</li>
                  )}
                </ul>
              </div>
            </Fragment>
          )}
        </div>
      );
    };

    const DEFAULT_INVOICE = {
      orderId: '', 
      orderDate: getCurrentDate(),
      invoiceNo: 'Loading...', 
      invoiceDate: getCurrentDate(),
      customerName: '',
      billingAddress: '',
      shippingAddress: '',
      customerStateName: 'Uttar Pradesh',
      customerStateCode: '09',
      customerDistrict: '',
      paymentMode: 'Online',
      items: [
        {
          id: 1,
          productName: '',
          description: '',
          hsn: '',
          qty: 1,
          price: 0,
          discount: 0,
          gstRate: 18 
        }
      ]
    };

    function App() {
      const [activeTab, setActiveTab] = useState('create'); 
      const [sameAsBilling, setSameAsBilling] = useState(true);
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      
      const [invoice, setInvoice] = useState(DEFAULT_INVOICE);
      const [invoiceHistory, setInvoiceHistory] = useState([]);
      const [itemsMaster, setItemsMaster] = useState(DEFAULT_ITEMS_MASTER); 
      const [settings, setSettings] = useState({ prefix: 'FAUVXD', nextNumber: 100 });
      const [isEditing, setIsEditing] = useState(false); 
      
      const [isSaving, setIsSaving] = useState(false);
      const [isFetching, setIsFetching] = useState(false);
      const [notification, setNotification] = useState('');

      const [itemForm, setItemForm] = useState({ id: '', brand: '', name: '', hsn: '', gstRate: 18, priceWithGst: '' });
      const [deleteModal, setDeleteModal] = useState({ isOpen: false, itemId: null, pin: '' });
      const [isItemFormVisible, setIsItemFormVisible] = useState(false);
      
      // History filters (Mode + Date Range + Search)
      const [historyFilter, setHistoryFilter] = useState('All');
      const [startDate, setStartDate] = useState(getFirstDayOfMonth());
      const [endDate, setEndDate] = useState(getLastDayOfMonth());
      const [searchInvoiceNo, setSearchInvoiceNo] = useState('');

      const isInterState = invoice.customerStateCode !== FIRM_DETAILS.stateCode;
      const isInvoiceCancelled = invoice.paymentMode === 'Cancelled';

      useEffect(() => {
        fetchAppData();
      }, []);

      const showNotification = (msg) => {
        setNotification(msg);
        setTimeout(() => setNotification(''), 4000);
      };

      const fetchAppData = async () => {
        if (!GOOGLE_SCRIPT_URL) return;
        setIsFetching(true);
        try {
          const response = await fetch(GOOGLE_SCRIPT_URL);
          const data = await response.json();
          
          if(data.settings) {
            setSettings(data.settings);
            if(activeTab === 'create' && invoice.invoiceNo === 'Loading...' && !isEditing) {
              setInvoice(prev => ({...prev, invoiceNo: `${data.settings.prefix}${String(data.settings.nextNumber).padStart(4, '0')}`}));
            }
          }
          
          if(data.history) {
            setInvoiceHistory(data.history.reverse());
          }

          if(data.items && data.items.length > 0) {
            setItemsMaster(data.items);
          }
        } catch (error) {
          console.error(error);
          showNotification('❌ Failed to fetch data from Sheets.');
        }
        setIsFetching(false);
      };

      const saveToSheet = async () => {
        if (!GOOGLE_SCRIPT_URL) {
          alert("Please configure GOOGLE_SCRIPT_URL first!");
          return;
        }

        if (!invoice.orderId?.trim()) return showNotification('⚠️ Order ID is required');
        if (!invoice.customerName?.trim()) return showNotification('⚠️ Customer Name is required');
        if (!invoice.customerStateCode?.trim()) return showNotification('⚠️ State is required');
        if (!invoice.customerDistrict?.trim()) return showNotification('⚠️ District is required');
        if (!invoice.billingAddress?.trim()) return showNotification('⚠️ Billing Address is required');
        if (!invoice.shippingAddress?.trim()) return showNotification('⚠️ Shipping Address is required');
        if (!invoice.items || invoice.items.length === 0) return showNotification('⚠️ At least one item is required');
        if (invoice.items.some(item => !item.productName?.trim())) return showNotification('⚠️ Product Name is required for all items');

        setIsSaving(true);
        
        let finalTotalPriceToSave = 0;
        
        // Agar invoice cancelled hai to total amount sheet mein 0.00 save hoga
        if (invoice.paymentMode !== 'Cancelled') {
          invoice.items.forEach(item => {
            const taxable = (item.price * item.qty) - item.discount;
            const gstAmt = taxable * (item.gstRate / 100);
            finalTotalPriceToSave += (taxable + gstAmt);
          });
        }

        const payload = {
          action: 'saveInvoice',
          data: {
            ...invoice,
            totalAmount: finalTotalPriceToSave.toFixed(2)
          }
        };

        try {
          const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          
          const result = await response.json();
          if (result.status === 'success') {
            showNotification(isEditing ? '✅ Invoice Updated in Cloud!' : '✅ Invoice Saved to Cloud!');
            fetchAppData();
          } else {
            showNotification('❌ Failed to save invoice.');
          }
        } catch (error) {
          console.error(error);
          showNotification('❌ Error connecting to Google Sheets.');
        }
        setIsSaving(false);
      };

      const saveSettingsToSheet = async () => {
        if (!GOOGLE_SCRIPT_URL) return;
        setIsSaving(true);
        
        const payload = {
          action: 'saveSettings',
          data: settings
        };

        try {
          const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          const result = await response.json();
          if (result.status === 'success') {
            showNotification('✅ Settings Saved Successfully!');
            fetchAppData();
          }
        } catch (error) {
          showNotification('❌ Error saving settings.');
        }
        setIsSaving(false);
      };

      const handleNewItemClick = () => {
        const currentIds = itemsMaster.map(i => parseInt(i.id.replace('p', '')) || 0);
        const maxId = currentIds.length > 0 ? Math.max(...currentIds) : 0;
        setItemForm({ id: `p${maxId + 1}`, brand: '', name: '', hsn: '', gstRate: 18, priceWithGst: '' });
        setIsItemFormVisible(true);
      };

      const saveItemToSheet = async () => {
        if (!GOOGLE_SCRIPT_URL) return alert("Please configure GOOGLE_SCRIPT_URL first!");
        
        if (!itemForm.name?.trim()) return showNotification('⚠️ Item Name is required');
        if (!itemForm.hsn?.trim()) return showNotification('⚠️ HSN Code is required');
        if (!itemForm.priceWithGst) return showNotification('⚠️ Price with GST is required');

        setIsSaving(true);
        
        const rate = parseFloat(itemForm.gstRate) || 0;
        const finalPrice = parseFloat(itemForm.priceWithGst) || 0;
        const calcTaxablePrice = (finalPrice / (1 + (rate / 100))).toFixed(2);

        const payload = {
          action: 'saveItem',
          data: {
            ...itemForm,
            taxablePrice: calcTaxablePrice
          }
        };

        try {
          const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          const result = await response.json();
          if (result.status === 'success') {
            showNotification('✅ Item Saved to Cloud!');
            fetchAppData(); 
            setItemForm({ id: '', brand: '', name: '', hsn: '', gstRate: 18, priceWithGst: '' }); 
            setIsItemFormVisible(false);
          } else {
            showNotification('❌ Failed to save item.');
          }
        } catch (error) { showNotification('❌ Error connecting to Google Sheets.'); }
        setIsSaving(false);
      };

      const confirmDeleteItem = async () => {
        if (deleteModal.pin !== '2026') {
          return showNotification('❌ Incorrect Security PIN!');
        }
        if (!GOOGLE_SCRIPT_URL) return alert("Please configure GOOGLE_SCRIPT_URL first!");

        setIsSaving(true);
        const payload = {
          action: 'deleteItem',
          data: { id: deleteModal.itemId }
        };

        try {
          const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          const result = await response.json();
          if (result.status === 'success') {
            showNotification('✅ Item Deleted Successfully!');
            fetchAppData(); 
            setDeleteModal({ isOpen: false, itemId: null, pin: '' });
            
            if (itemForm.id === deleteModal.itemId) {
              setItemForm({ id: '', brand: '', name: '', hsn: '', gstRate: 18, priceWithGst: '' });
              setIsItemFormVisible(false);
            }
          } else {
            showNotification('❌ Failed to delete item.');
          }
        } catch (error) { showNotification('❌ Error connecting to Google Sheets.'); }
        setIsSaving(false);
      };

      const handleNewInvoiceClick = () => {
        setInvoice({
          ...DEFAULT_INVOICE,
          orderId: '', 
          invoiceNo: `${settings.prefix}${String(settings.nextNumber).padStart(4, '0')}`
        });
        setIsEditing(false); 
        setActiveTab('create');
        setIsSidebarOpen(false);
      };

      const loadOldInvoice = (oldInvoice) => {
        let updatedInvoice = { ...oldInvoice };
        if (oldInvoice.orderDate && oldInvoice.orderDate.includes('T')) {
          updatedInvoice.orderDate = oldInvoice.orderDate.split('T')[0];
        }
        if (oldInvoice.invoiceDate && oldInvoice.invoiceDate.includes('T')) {
          updatedInvoice.invoiceDate = oldInvoice.invoiceDate.split('T')[0];
        }
        setInvoice(updatedInvoice);
        setIsEditing(true); 
        setActiveTab('create');
        setIsSidebarOpen(false);
      };

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setInvoice(prev => {
          const updated = { ...prev, [name]: value };
          if (name === 'billingAddress' && sameAsBilling) {
            updated.shippingAddress = value;
          }
          return updated;
        });
      };

      const handleSameAsBillingChange = (e) => {
        const isChecked = e.target.checked;
        setSameAsBilling(isChecked);
        if (isChecked) {
          setInvoice(prev => ({ ...prev, shippingAddress: prev.billingAddress }));
        }
      };

      const handleStateChange = (e) => {
        const selectedName = e.target.value;
        const entry = Object.entries(STATE_DISTRICT_DATA).find(([code, data]) => data.name === selectedName);
        setInvoice({
          ...invoice,
          customerStateName: selectedName,
          customerStateCode: entry ? entry[0] : '',
          customerDistrict: ''
        });
      };

      const handleProductChange = (id, newName) => {
        const productObj = itemsMaster.find(p => p.name === newName);
        const updatedItems = invoice.items.map(item => {
          if (item.id === id) {
            if (productObj) {
              return { 
                ...item, 
                productName: newName, 
                description: `Brand: ${productObj.brand}`, 
                hsn: productObj.hsn, 
                price: productObj.taxablePrice, 
                gstRate: productObj.gstRate 
              };
            }
            return { ...item, productName: newName };
          }
          return item;
        });
        setInvoice({ ...invoice, items: updatedItems });
      };

      const handleItemChange = (id, field, value) => {
        const updatedItems = invoice.items.map(item => {
          if (item.id === id) {
            return { ...item, [field]: field === 'productName' || field === 'description' || field === 'hsn' ? value : Number(value) };
          }
          return item;
        });
        setInvoice({ ...invoice, items: updatedItems });
      };

      const addItem = () => {
        const newItem = { id: Date.now(), productName: '', description: '', hsn: '', qty: 1, price: 0, discount: 0, gstRate: 18 };
        setInvoice({ ...invoice, items: [...invoice.items, newItem] });
      };

      const removeItem = (id) => {
        setInvoice({ ...invoice, items: invoice.items.filter(item => item.id !== id) });
      };

      const printInvoice = () => window.print();

      let totalQty = 0;
      let finalTotalPrice = 0;

      let qrTotalAmount = 0;
      
      // QR Code calculation (Ignore if cancelled)
      if (!isInvoiceCancelled) {
        invoice.items.forEach(item => {
          const taxable = (item.price * item.qty) - item.discount;
          qrTotalAmount += taxable + (taxable * (item.gstRate / 100));
        });
      }
      
      const formattedQrDate = formatCustomDate(invoice.invoiceDate);
      const qrData = `Invoice No: ${invoice.invoiceNo} \nDate: ${formattedQrDate} \nTotal Amount: Rs. ${qrTotalAmount.toFixed(2)}`;
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrData)}`;

      // Filter history based on Date Range, Payment Mode, and Invoice No
      const filteredHistory = invoiceHistory.filter(inv => {
        // Invoice Number Search filter
        if (searchInvoiceNo && inv.invoiceNo) {
          if (!inv.invoiceNo.toLowerCase().includes(searchInvoiceNo.toLowerCase())) return false;
        }

        // Mode filter
        if (historyFilter !== 'All') {
          const mode = inv.paymentMode || 'Online';
          if (mode !== historyFilter) return false;
        }

        // Date filter
        if (inv.orderDate) {
          const invDate = inv.orderDate.split('T')[0];
          if (startDate && invDate < startDate) return false;
          if (endDate && invDate > endDate) return false;
        }

        return true;
      });

      return (
        <div className="flex h-screen w-full bg-gray-100 font-sans text-gray-800 overflow-hidden relative">
          
          {/* Sidebar Backdrop Overlay */}
          {isSidebarOpen && (
            <div 
              className="fixed inset-0 bg-black/50 z-40 no-print transition-opacity" 
              onClick={() => setIsSidebarOpen(false)}
            ></div>
          )}

          {/* Collapsible Left Navigation Panel */}
          <div className={`fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 text-slate-300 flex flex-col no-print shadow-2xl transition-transform duration-300 ease-in-out ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
            <div className="p-5 border-b border-slate-800 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="bg-blue-600 p-2 rounded-lg text-white">
                  <LayoutDashboard className="w-5 h-5" />
                </div>
                <div>
                  <h1 className="text-white font-bold text-lg leading-tight tracking-wide">{FIRM_DETAILS.name}</h1>
                </div>
              </div>
              <button onClick={() => setIsSidebarOpen(false)} className="text-slate-400 hover:text-white p-1 rounded-md">
                <X className="w-5 h-5" />
              </button>
            </div>
            
            <div className="p-3 space-y-2 mt-4 flex-1">
              <button 
                onClick={handleNewInvoiceClick}
                className={`w-full flex items-center gap-3 p-3 rounded-lg transition-all text-sm font-medium ${activeTab === 'create' ? 'bg-blue-600 text-white shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}
              >
                <Plus className="w-4 h-4" /> New Invoice
              </button>
              
              <button 
                onClick={() => { setActiveTab('history'); setIsSidebarOpen(false); }}
                className={`w-full flex items-center gap-3 p-3 rounded-lg transition-all text-sm font-medium ${activeTab === 'history' ? 'bg-blue-600 text-white shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}
              >
                <History className="w-4 h-4" /> Invoice History
              </button>

              <button 
                onClick={() => { setActiveTab('items'); setIsSidebarOpen(false); }}
                className={`w-full flex items-center gap-3 p-3 rounded-lg transition-all text-sm font-medium ${activeTab === 'items' ? 'bg-blue-600 text-white shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}
              >
                <Package className="w-4 h-4" /> Items Master
              </button>

              <button 
                onClick={() => { setActiveTab('settings'); setIsSidebarOpen(false); }}
                className={`w-full flex items-center gap-3 p-3 rounded-lg transition-all text-sm font-medium ${activeTab === 'settings' ? 'bg-blue-600 text-white shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}
              >
                <SettingsIcon className="w-4 h-4" /> Settings
              </button>
            </div>

            <div className="p-4 border-t border-slate-800 text-xs text-slate-500 text-center flex flex-col gap-1">
              <p>GST: {FIRM_DETAILS.gstin}</p>
              <p className="text-[10px] italic">Next Inv: {settings.prefix}{String(settings.nextNumber).padStart(4, '0')}</p>
            </div>
          </div>

          {/* Main Layout wrapper */}
          <div className="flex-1 flex flex-col h-full w-full relative">
            
            {/* Top Bar for Hamburger Menu */}
            <header className="bg-white border-b border-gray-200 p-3 flex items-center gap-4 no-print shadow-sm z-30 shrink-0">
              <button 
                onClick={() => setIsSidebarOpen(true)}
                className="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-700 transition-colors flex items-center justify-center"
              >
                <Menu className="w-5 h-5" />
              </button>
              <h1 className="font-bold text-lg text-gray-800 flex items-center gap-2">
                {activeTab === 'create' && <><FileText className="w-5 h-5 text-blue-600"/> Invoice Entry</>}
                {activeTab === 'history' && <><History className="w-5 h-5 text-blue-600"/> Invoice History</>}
                {activeTab === 'items' && <><Package className="w-5 h-5 text-blue-600"/> Items Master</>}
                {activeTab === 'settings' && <><SettingsIcon className="w-5 h-5 text-blue-600"/> Settings</>}
              </h1>
            </header>

            {/* Scrollable Main Area */}
            <main className="flex-1 overflow-y-auto print-area w-full relative">
              
              {notification && (
                <div className="absolute top-4 right-4 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-2xl z-50 animate-bounce flex items-center gap-2">
                  {notification}
                </div>
              )}

              {/* Security PIN Modal for Deletion */}
              {deleteModal.isOpen && (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 no-print">
                  <div className="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full mx-4">
                    <h3 className="font-bold text-xl mb-2 text-red-600 flex items-center gap-2">
                      <Trash2 className="w-5 h-5" /> Security Check
                    </h3>
                    <p className="text-sm text-gray-600 mb-4">You are about to delete item <strong>{deleteModal.itemId}</strong>. Please enter the security PIN to confirm.</p>
                    
                    <input
                      type="password"
                      autoFocus
                      placeholder="Enter PIN..."
                      className="w-full border-2 border-gray-200 p-3 rounded-lg mb-6 outline-none focus:border-red-500 text-center text-lg tracking-widest font-bold"
                      value={deleteModal.pin}
                      onChange={e => setDeleteModal({...deleteModal, pin: e.target.value})}
                      onKeyDown={e => e.key === 'Enter' && confirmDeleteItem()}
                    />
                    
                    <div className="flex gap-3 justify-end">
                      <button 
                        onClick={() => setDeleteModal({isOpen: false, itemId: null, pin: ''})} 
                        className="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-lg transition-colors"
                      >
                        Cancel
                      </button>
                      <button 
                        onClick={confirmDeleteItem} 
                        disabled={isSaving}
                        className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg transition-colors disabled:bg-red-300 flex items-center gap-2"
                      >
                        {isSaving ? <RefreshCw className="w-4 h-4 animate-spin" /> : null}
                        Delete Item
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {activeTab === 'create' && (
                <div className="p-4 md:p-6 grid grid-cols-1 xl:grid-cols-12 gap-6 max-w-[1800px] mx-auto print-area">
                  
                  <div className="xl:col-span-5 bg-white p-6 rounded-xl shadow-sm border border-gray-200 no-print">
                    <div className="flex items-center justify-end mb-6 pb-4 border-b">
                      <div className="flex gap-2">
                        <button 
                          onClick={saveToSheet}
                          disabled={isSaving}
                          className={`${isEditing ? 'bg-orange-500 hover:bg-orange-600 disabled:bg-orange-300' : 'bg-green-600 hover:bg-green-700 disabled:bg-green-400'} text-white px-3 py-2 rounded-md flex items-center gap-2 text-sm transition-colors shadow-sm`}
                        >
                          {isSaving ? <RefreshCw className="w-4 h-4 animate-spin" /> : <Save className="w-4 h-4" />} 
                          {isEditing ? 'Update' : 'Save'}
                        </button>
                        <button 
                          onClick={printInvoice}
                          className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-md flex items-center gap-2 text-sm transition-colors shadow-sm"
                        >
                          <Printer className="w-4 h-4" /> Print
                        </button>
                      </div>
                    </div>

                    <div className="space-y-5">
                      <div className="grid grid-cols-2 gap-4 text-sm bg-gray-50 p-4 rounded-lg border">
                        <div>
                          <label className="block text-xs font-semibold text-gray-600 mb-1">Order ID <span className="text-red-500">*</span></label>
                          <input type="text" name="orderId" value={invoice.orderId} onChange={handleInputChange} className="w-full border p-2 rounded bg-white shadow-inner" />
                        </div>
                        <div>
                          <label className="block text-xs font-semibold text-gray-600 mb-1">Order Date</label>
                          <input 
                            type="date" 
                            name="orderDate" 
                            value={invoice.orderDate} 
                            onChange={handleInputChange} 
                            className="w-full border border-blue-200 p-2 rounded bg-gradient-to-r from-blue-50 to-indigo-50 text-indigo-800 shadow-inner font-bold outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all cursor-pointer text-xs" 
                          />
                        </div>
                        <div>
                          <label className="block text-xs font-semibold text-gray-600 mb-1">Invoice No (Locked)</label>
                          <input 
                            type="text" 
                            name="invoiceNo" 
                            value={invoice.invoiceNo} 
                            disabled={true}
                            readOnly
                            className="w-full border p-2 rounded shadow-inner font-bold bg-gray-200 text-gray-500 cursor-not-allowed border-gray-300" 
                          />
                        </div>
                        <div>
                          <label className="block text-xs font-semibold text-gray-600 mb-1">Invoice Date</label>
                          <input 
                            type="date" 
                            name="invoiceDate" 
                            value={invoice.invoiceDate} 
                            onChange={handleInputChange} 
                            className="w-full border border-purple-200 p-2 rounded bg-gradient-to-r from-purple-50 to-pink-50 text-purple-800 shadow-inner font-bold outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all cursor-pointer text-xs" 
                          />
                        </div>
                        <div>
                          <label className="block text-xs font-semibold text-gray-600 mb-1">Payment Mode</label>
                          <select name="paymentMode" value={invoice.paymentMode || 'Online'} onChange={handleInputChange} className="w-full border p-2 rounded bg-white shadow-inner outline-none focus:border-blue-500 font-medium">
                            <option value="Online">Online</option>
                            <option value="COD">Cash on Delivery (COD)</option>

                                  <td className="p-3 font-mono text-xs text-gray-500">{item.id}</td>
                                  <td className="p-3 font-medium text-gray-800">
                                    {item.name}<br/>
                                    <span className="text-[10px] text-gray-400 font-normal">{item.brand}</span>
                                  </td>
                                  <td className="p-3 text-gray-600">{item.hsn}</td>
                                  <td className="p-3 text-gray-600">{item.gstRate}%</td>
                                  <td className="p-3 text-gray-600">₹{item.taxablePrice}</td>
                                  <td className="p-3 font-bold text-green-600">₹{item.priceWithGst}</td>
                                  <td className="p-3">
                                    <div className="flex justify-center items-center gap-2">
                                      <button 
                                        onClick={() => { setItemForm(item); setIsItemFormVisible(true); }}
                                        title="Edit Item"
                                        className="text-blue-600 hover:text-blue-800 bg-blue-100 hover:bg-blue-200 p-2 rounded-md transition-colors"
                                      >
                                        <Edit className="w-4 h-4" />
                                      </button>
                                      <button 
                                        onClick={() => setDeleteModal({ isOpen: true, itemId: item.id, pin: '' })}
                                        title="Delete Item"
                                        className="text-red-600 hover:text-red-800 bg-red-100 hover:bg-red-200 p-2 rounded-md transition-colors"
                                      >
                                        <Trash2 className="w-4 h-4" />
                                      </button>
                                    </div>
                                  </td>
                                </tr>
                              ))
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>

                  </div>
                </div>
              )}

              {activeTab === 'history' && (
                <div className="p-4 md:p-8 max-w-5xl mx-auto">
                  <div className="flex flex-col md:flex-row justify-end items-start md:items-center gap-4 mb-6">
                    {/* Yaha naya Date Filter aur Mode Filter group hai */}
                    <div className="flex flex-wrap items-center gap-3 w-full justify-end">
                      
                      {/* Invoice number ke hisaab se filter */}
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-2 flex items-center pointer-events-none">
                          <SearchIcon className="w-4 h-4 text-gray-400" />
                        </div>
                        <input 
                          type="text" 
                          placeholder="Search Invoice No..." 
                          value={searchInvoiceNo} 
                          onChange={(e) => setSearchInvoiceNo(e.target.value)}
                          className="bg-white border border-gray-300 pl-8 pr-3 py-1.5 rounded-md text-sm shadow-sm outline-none focus:border-blue-500 w-44"
                        />
                      </div>

                      <div className="flex items-center gap-2">
                        <label className="text-xs font-semibold text-gray-500 uppercase">From:</label>
                        <input 
                          type="date" 
                          value={startDate} 
                          onChange={(e) => setStartDate(e.target.value)}
                          className="bg-white border border-gray-300 px-2 py-1.5 rounded-md text-sm shadow-sm outline-none focus:border-blue-500 cursor-pointer"
                        />
                      </div>
                      <div className="flex items-center gap-2">
                        <label className="text-xs font-semibold text-gray-500 uppercase">To:</label>
                        <input 
                          type="date" 
                          value={endDate} 
                          onChange={(e) => setEndDate(e.target.value)}
                          className="bg-white border border-gray-300 px-2 py-1.5 rounded-md text-sm shadow-sm outline-none focus:border-blue-500 cursor-pointer"
                        />
                      </div>

                      <select 
                        value={historyFilter} 
                        onChange={(e) => setHistoryFilter(e.target.value)}
                        className="bg-white border border-gray-300 px-3 py-2 rounded-md text-sm shadow-sm outline-none focus:border-blue-500 font-medium text-gray-700 cursor-pointer"
                      >
                        <option value="All">All Modes</option>
                        <option value="Online">Online</option>
                        <option value="COD">Cash on Delivery (COD)</option>
                        <option value="Cancelled">Cancelled</option>
                      </select>

                      <button 
                        onClick={fetchAppData}
                        className="bg-white border border-gray-300 hover:bg-gray-50 px-4 py-2 rounded-md flex items-center gap-2 text-sm shadow-sm transition-colors"
                      >
                        <RefreshCw className={`w-4 h-4 ${isFetching ? 'animate-spin text-blue-600' : 'text-gray-600'}`} /> Refresh
                      </button>
                    </div>
                  </div>

                  <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <table className="w-full text-left border-collapse">
                      <thead className="bg-slate-50 border-b border-gray-200 text-sm">
                        <tr>
                          <th className="p-4 font-semibold text-gray-600">Date</th>
                          <th className="p-4 font-semibold text-gray-600">Invoice No</th>
                          <th className="p-4 font-semibold text-gray-600">Order ID</th>
                          <th className="p-4 font-semibold text-gray-600">Customer Name</th>
                          <th className="p-4 font-semibold text-gray-600 text-center">Mode</th>
                          <th className="p-4 font-semibold text-gray-600">Total Amount</th>
                          <th className="p-4 font-semibold text-gray-600 text-center">Action</th>
                        </tr>
                      </thead>
                      <tbody className="text-sm">
                        {isFetching ? (
                          <tr>
                            <td colSpan="7" className="p-8 text-center text-gray-500">Loading your invoices from Google Sheets...</td>
                          </tr>
                        ) : filteredHistory.length === 0 ? (
                          <tr>
                            <td colSpan="7" className="p-8 text-center text-gray-500">No invoices found for this filter.</td>
                          </tr>
                        ) : (
                          filteredHistory.map((inv, idx) => {
                            const currentMode = inv.paymentMode || 'Online';
                            return (
                              <tr key={idx} className={`border-b border-gray-100 hover:bg-blue-50 transition-colors ${currentMode === 'Cancelled' ? 'bg-red-50/30 opacity-70' : ''}`}>
                                <td className="p-4 text-gray-600">{formatCustomDate(inv.orderDate)}</td>
                                <td className={`p-4 font-medium ${currentMode === 'Cancelled' ? 'text-red-700 line-through decoration-red-400' : 'text-gray-800'}`}>
                                  {inv.invoiceNo}
                                </td>
                                <td className="p-4 text-gray-500 text-xs">{inv.orderId}</td>
                                <td className="p-4 font-medium">{inv.customerName}</td>
                                <td className="p-4 text-center">
                                  <span className={`px-2 py-1 rounded text-xs font-bold ${
                                    currentMode === 'Cancelled' ? 'bg-red-100 text-red-600' : 
                                    currentMode === 'COD' ? 'bg-orange-100 text-orange-700' : 
                                    'bg-green-100 text-green-700'
                                  }`}>
                                    {currentMode}
                                  </span>
                                </td>
                                <td className={`p-4 font-bold ${currentMode === 'Cancelled' ? 'text-gray-500' : 'text-green-600'}`}>
                                  ₹{inv.totalAmount}
                                </td>
                                <td className="p-4 text-center">
                                  <button 
                                    onClick={() => loadOldInvoice(inv)}
                                    className="text-blue-600 hover:text-blue-800 bg-blue-100 hover:bg-blue-200 px-3 py-1.5 rounded-md flex items-center justify-center gap-1 w-full font-medium transition-colors"
                                  >
                                    <FileCheck className="w-4 h-4" /> View
                                  </button>
                                </td>
                              </tr>
                            );
                          })
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {activeTab === 'settings' && (
                <div className="p-4 md:p-8 max-w-2xl mx-auto">
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-2xl font-bold flex items-center gap-2 text-gray-800">
                      <SettingsIcon className="w-6 h-6 text-blue-600" />
                      Invoice Settings
                    </h2>
                  </div>

                  <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <div className="space-y-6">
                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Invoice Prefix</label>
                        <input 
                          type="text" 
                          value={settings.prefix}
                          onChange={(e) => setSettings({...settings, prefix: e.target.value.toUpperCase()})}
                          className="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                          placeholder="e.g. FAUVXD"
                        />
                        <p className="text-xs text-gray-500 mt-1">This will be added before the invoice sequence number.</p>
                      </div>

                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Next Invoice Sequence Number</label>
                        <input 
                          type="number" 
                          value={settings.nextNumber}
                          onChange={(e) => setSettings({...settings, nextNumber: Number(e.target.value)})}
                          className="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                          placeholder="e.g. 137"
                        />
                        <p className="text-xs text-gray-500 mt-1">This number will auto-increment every time you save a new invoice.</p>
                      </div>

                      <div className="bg-blue-50 p-4 rounded-lg border border-blue-100 flex justify-between items-center">
                        <div>
                          <span className="text-sm text-blue-800 font-medium">Preview of Next Invoice No:</span>
                        </div>
                        <div className="font-bold text-lg text-blue-900 tracking-wider">
                          {settings.prefix}{String(settings.nextNumber).padStart(4, '0')}
                        </div>
                      </div>

                      <button 
                        onClick={saveSettingsToSheet}
                        disabled={isSaving}
                        className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white p-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-colors"
                      >
                        {isSaving ? <RefreshCw className="w-5 h-5 animate-spin" /> : <Save className="w-5 h-5" />} 
                        Save Settings to Cloud
                      </button>

                    </div>
                  </div>
                </div>
              )}
            </main>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
